<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Villa Senja — hero masking lab</title>
  <link rel="stylesheet" href="styles.css?v=100" />
  <style>
    body { margin: 0; background: var(--clay); }
    .lab-note { position: fixed; top: 0; left: 0; right: 0; z-index: 9; padding: 0.5rem 1rem; font: 600 0.7rem "Hanken Grotesk", sans-serif; letter-spacing: 0.14em; text-transform: uppercase; color: color-mix(in srgb, var(--cream) 70%, transparent); background: rgba(20,10,4,0.5); }

    /* dusk stage: warm radial glowless wash (ember low, clay up) */
    .gh { position: relative; height: 100vh; display: grid; place-items: center; overflow: hidden; perspective: 1300px;
      background: radial-gradient(125% 95% at 50% 88%, color-mix(in srgb, var(--ochre) 20%, var(--clay)) 0%, var(--clay) 52%, color-mix(in srgb, var(--teak) 30%, var(--clay)) 100%); }

    /* faint candi-bentar gate, framing the word (callback to the loader) */
    .gh__gate { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -47%); width: min(78vw, 900px); height: auto; color: color-mix(in srgb, var(--ochre) 42%, transparent); opacity: 0.45; pointer-events: none; }

    /* THE WORD-WINDOW: the letters mask the living dusk valley */
    .gh__senja { position: relative; margin: 0; font-family: "Salmond", Georgia, serif; font-weight: 700; text-transform: uppercase; letter-spacing: -0.02em; line-height: 0.8; font-size: clamp(96px, 26vw, 520px);
      background-image: linear-gradient(180deg, color-mix(in srgb, var(--ember) 32%, transparent), color-mix(in srgb, var(--teak) 42%, transparent)), url("images/valley.jpg");
      background-size: 132% auto; background-position: 50% 42%; background-repeat: no-repeat;
      -webkit-background-clip: text; background-clip: text; color: transparent; -webkit-text-fill-color: transparent;
      /* push the (cool/green) valley toward warm dusk */
      filter: sepia(0.24) saturate(1.3) hue-rotate(-12deg) brightness(1.05) contrast(1.02);
      transform-style: preserve-3d; will-change: background-position, clip-path, transform; }

    .gh__sub { position: absolute; bottom: 15%; left: 50%; transform: translateX(-50%); font-family: "Hanken Grotesk", sans-serif; letter-spacing: 0.24em; text-transform: uppercase; font-size: 0.72rem; color: color-mix(in srgb, var(--cream) 72%, transparent); }
    .gh__cue { position: absolute; bottom: 6.5%; left: 50%; transform: translateX(-50%); color: color-mix(in srgb, var(--cream) 55%, transparent); font-size: 1.1rem; }
  </style>
</head>
<body>
  <div class="lab-note">Hero masking lab — SENJA word-window: the letters mask warm-graded dusk valley · drifts on mouse · masked wipe-in</div>
  <section class="gh">
    <svg class="gh__gate" viewBox="0 0 200 100" fill="none" stroke="currentColor" stroke-width="1.1" aria-hidden="true">
      <path d="M92 92 L92 20 L84 20 L84 12 L92 12 L92 14 L80 14 L80 26 L66 26 L66 38 L52 38 L52 50 L38 50 L38 62 L24 62 L24 74 L12 74 L12 92 Z"/>
      <path d="M108 92 L108 20 L116 20 L116 12 L108 12 L108 14 L120 14 L120 26 L134 26 L134 38 L148 38 L148 50 L162 50 L162 62 L176 62 L176 74 L188 74 L188 92 Z"/>
      <path d="M8 93 L192 93"/>
    </svg>
    <h1 class="gh__senja">Senja</h1>
    <p class="gh__sub">the warm Balinese dusk · Ubud</p>
    <div class="gh__cue">↓</div>
  </section>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script>
    const w = document.querySelector(".gh__senja");
    // masked wipe-in: the valley opens out from the centre of the letters
    gsap.fromTo(w,
      { clipPath: "inset(0 50% 0 50%)", backgroundSize: "168% auto", opacity: 0 },
      { clipPath: "inset(0 0% 0 0%)", backgroundSize: "150% auto", opacity: 1, duration: 1.7, ease: "expo.out" });

    // MWG 039's real mechanic, fused into the word-window: the window tilts toward
    // cursor velocity (rotationX/Y), the valley parallaxes inside the letters, and it
    // zooms out while you move / breathes back in when you stop — a living dusk window.
    const rotYTo = gsap.quickTo(w, "rotationY", { duration: 1, ease: "power4" });
    const rotXTo = gsap.quickTo(w, "rotationX", { duration: 1, ease: "power4" });
    const clamp = gsap.utils.clamp(-12, 12);
    let oldX = 0, oldY = 0, tx = 50, ty = 42, cx = 50, cy = 42, moving;
    addEventListener("mousemove", (e) => {
      rotYTo(clamp((e.clientX - oldX) * 0.6));
      rotXTo(clamp(-(e.clientY - oldY) * 0.6));
      tx = 50 + ((e.clientX / innerWidth) - 0.5) * -14;
      ty = 42 + ((e.clientY / innerHeight) - 0.5) * -10;
      oldX = e.clientX; oldY = e.clientY;
      gsap.to(w, { backgroundSize: "150% auto", duration: 2, ease: "power1", overwrite: "auto" });   // zoom out while moving
      clearTimeout(moving);
      moving = setTimeout(() => { rotYTo(0); rotXTo(0); gsap.to(w, { backgroundSize: "168% auto", duration: 2, ease: "power1" }); }, 80);  // settle + breathe back in
    });
    gsap.ticker.add(() => { cx += (tx - cx) * 0.06; cy += (ty - cy) * 0.06; w.style.backgroundPosition = cx + "% " + cy + "%"; });
  </script>
</body>
</html>
