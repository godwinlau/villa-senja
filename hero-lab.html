<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Villa Senja — hero mask-expand lab</title>
  <link rel="stylesheet" href="styles.css?v=100" />
  <style>
    body { margin: 0; background: var(--espresso); }
    .lab-note { position: fixed; top: 0; left: 0; right: 0; z-index: 9; padding: 0.5rem 1rem; font: 600 0.7rem "Hanken Grotesk", sans-serif; letter-spacing: 0.14em; text-transform: uppercase; color: color-mix(in srgb, var(--cream) 70%, transparent); background: rgba(20,10,4,0.5); }

    .gh { position: relative; height: 100vh; overflow: hidden; display: grid; place-items: center; background: var(--espresso); }

    /* 037 — the EXPANDING MASK: the opaque band of this gradient starts below the box
       (valley hidden) and animates up to cover it, uncovering the dusk valley bottom→top. */
    .gh__reveal { position: absolute; inset: 0; overflow: hidden;
      -webkit-mask-image: linear-gradient(transparent 100%, #000 125%, #000 225%);
              mask-image: linear-gradient(transparent 100%, #000 125%, #000 225%); }
    .gh__media { position: absolute; inset: 0; width: 100%; height: calc(100% + 80px); object-fit: cover;
      /* warm the (cool/green) valley toward dusk + sink it for text contrast */
      filter: saturate(1.16) contrast(1.03) sepia(0.2) hue-rotate(-12deg) brightness(0.86); }
    .gh__grade { position: absolute; inset: 0; pointer-events: none;
      background:
        linear-gradient(180deg, color-mix(in srgb, var(--espresso) 45%, transparent) 0%, transparent 32%, color-mix(in srgb, var(--teak) 60%, transparent) 100%),
        radial-gradient(135% 90% at 50% 22%, transparent 40%, color-mix(in srgb, var(--ember) 22%, transparent) 100%); }

    /* 046 — SENJA letters rise from behind a per-letter clip mask */
    .gh__senja { position: relative; z-index: 2; margin: 0; display: flex; gap: 0.01em;
      font-family: "Salmond", Georgia, serif; font-weight: 700; text-transform: uppercase; letter-spacing: -0.015em; line-height: 0.82;
      font-size: clamp(96px, 25vw, 480px); color: var(--cream); }
    .gh__senja .l { display: inline-block; overflow: hidden; }       /* the clip mask */
    .gh__senja .l > span { display: inline-block; will-change: transform; }
    .gh__sub { position: absolute; z-index: 2; bottom: 14%; left: 50%; transform: translateX(-50%); font-family: "Hanken Grotesk", sans-serif; letter-spacing: 0.24em; text-transform: uppercase; font-size: 0.72rem; color: color-mix(in srgb, var(--cream) 76%, transparent); }
    .gh__cue { position: absolute; z-index: 2; bottom: 6.5%; left: 50%; transform: translateX(-50%); color: color-mix(in srgb, var(--cream) 55%, transparent); font-size: 1.1rem; }
  </style>
</head>
<body>
  <div class="lab-note">Hero mask-expand lab — 037 (gradient mask grows to uncover the dusk valley) + 046 (SENJA letters rise from clip masks)</div>
  <section class="gh">
    <div class="gh__reveal">
      <img class="gh__media" src="images/valley.jpg" alt="" />
      <div class="gh__grade"></div>
    </div>
    <h1 class="gh__senja" aria-label="Senja">
      <span class="l"><span>S</span></span><span class="l"><span>E</span></span><span class="l"><span>N</span></span><span class="l"><span>J</span></span><span class="l"><span>A</span></span>
    </h1>
    <p class="gh__sub">the warm Balinese dusk · Ubud</p>
    <div class="gh__cue">↓</div>
  </section>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script>
    const revealed = "linear-gradient(transparent -25%, #000 0%, #000 100%)";
    const tl = gsap.timeline({ defaults: { ease: "power3.inOut" } });
    // 037: the mask expands up to uncover the valley + the photo settles its push-in
    tl.to(".gh__reveal", { maskImage: revealed, webkitMaskImage: revealed, duration: 1.8 }, 0)
      .from(".gh__media", { scale: 1.14, yPercent: 4, duration: 2.2, ease: "power3.out" }, 0)
      // 046: SENJA letters rise from behind their clip masks, staggered
      .from(".gh__senja .l > span", { yPercent: 118, duration: 1.0, ease: "expo.out", stagger: 0.08 }, 0.55)
      .from([".gh__sub", ".gh__cue"], { opacity: 0, y: 12, duration: 0.8, ease: "power2.out" }, 1.5);
  </script>
</body>
</html>
