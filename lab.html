<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Villa Senja — motion lab (GSAP effects prototype)</title>
  <link rel="stylesheet" href="styles.css?v=100" />
  <style>
    body { margin: 0; background: var(--clay); color: var(--cream); font-family: "Hanken Grotesk", sans-serif; }
    .lab-note { position: fixed; top: 0; left: 0; right: 0; z-index: 50; padding: 0.6rem 1rem; font-size: 0.72rem; letter-spacing: 0.14em; text-transform: uppercase; color: color-mix(in srgb, var(--cream) 70%, transparent); background: rgba(20,10,4,0.6); -webkit-backdrop-filter: blur(6px); backdrop-filter: blur(6px); }
    .lab-spacer { height: 60vh; display: flex; align-items: center; justify-content: center; color: color-mix(in srgb, var(--cream) 55%, transparent); font-size: 0.8rem; letter-spacing: 0.2em; text-transform: uppercase; }
    .lab-tag { display: block; text-align: center; padding-top: 3rem; font-size: 0.72rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--ochre); }

    /* ── EFFECT A: jelly headline 089 — Matter.js physics (letters = soft-spring bodies, chained) ── */
    .mwg_effect089 { padding: 100vh 0; }
    .mwg_effect089 .scroll { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 0; font-size: 0.72rem; letter-spacing: 0.2em; text-transform: uppercase; color: color-mix(in srgb, var(--cream) 35%, transparent); }
    .mwg_effect089 .container { position: relative; z-index: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 0 25px; }
    /* reference phrase in our on-brand display serif; solid letters so the physics motion reads */
    .mwg_effect089 .text { margin: 8vh 0; text-align: center; white-space: nowrap; font-family: "Salmond", Georgia, serif; color: var(--cream); text-transform: none; font-size: max(50px, 10vw); }
    .mwg_effect089 .letter { display: inline-block; }

    /* ── EFFECT B: upward image flow (082) ── */
    .flow { position: relative; background: var(--espresso); }
    .flow__hint { position: absolute; top: 1.5rem; left: 50%; transform: translateX(-50%); z-index: 3; font-size: 0.72rem; letter-spacing: 0.2em; text-transform: uppercase; color: color-mix(in srgb, var(--cream) 60%, transparent); }
    .flow__pin { height: 600vh; }
    .flow__stage { position: sticky; top: 0; height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }
    .flow__media { position: absolute; width: min(38vw, 26rem); aspect-ratio: 4 / 5; object-fit: cover; border-radius: 14px; box-shadow: 0 50px 110px -45px rgba(0,0,0,0.7); will-change: transform, opacity; }
  </style>
</head>
<body>
  <div class="lab-note">Villa Senja · motion lab — 089 jelly headline (Matter.js physics) · 082 upward image flow</div>

  <div class="lab-spacer">scroll down ↓</div>

  <span class="lab-tag">089 · jelly headline (Matter.js physics — reference phrase, same length)</span>
  <section class="mwg_effect089">
    <p class="scroll">Scroll</p>
    <div class="container">
      <p class="text">Italian Negroni</p>
    </div>
  </section>

  <span class="lab-tag">082 · upward image flow</span>
  <section class="flow">
    <p class="flow__hint">scroll</p>
    <div class="flow__pin">
      <div class="flow__stage">
        <img class="flow__media" src="images/suite.jpg" alt="" />
        <img class="flow__media" src="images/pool.jpg" alt="" />
        <img class="flow__media" src="images/dining.jpg" alt="" />
        <img class="flow__media" src="images/pavilion.jpg" alt="" />
        <img class="flow__media" src="images/terrace.jpg" alt="" />
      </div>
    </div>
  </section>

  <div class="lab-spacer">end of lab</div>

  <script src="https://unpkg.com/lenis@1.1.14/dist/lenis.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
  <script>
    gsap.registerPlugin(ScrollTrigger);

    /* Smooth scroll (Lenis) wired into the GSAP ticker — identical to the live site.
       The 089 physics is driven by ScrollTrigger.getVelocity(); on raw native scroll
       that velocity is spiky and the letters get violent erratic kicks. Lenis feeds a
       smooth velocity, which is what the reference swing actually rides on. */
    let lenis = null;
    if (window.Lenis) {
      lenis = new Lenis({ duration: 1.2, easing: (t) => Math.min(1, 1.001 - Math.pow(2, -10 * t)) });
      window.__lenis = lenis;
      lenis.on("scroll", () => ScrollTrigger.update());
      gsap.ticker.add((time) => lenis.raf(time * 1000));
      gsap.ticker.lagSmoothing(0);
    }

    /* EFFECT A — JELLY HEADLINE 089 (the actual reference technique).
       Each letter is a Matter.js rigid body held to its home position by a very soft
       spring constraint, and adjacent letters are linked together (a chain). Scroll
       velocity displaces the spring ANCHORS (ends most, middle least) so the word
       swings/sways on its springs and the motion ripples through the chain, then
       settles via physics damping + gravity. Verbatim reference, selectors adapted. */
    (function jellyHeadline089() {
      const root = document.querySelector('.mwg_effect089');
      if (!root || !window.Matter) return;
      const text = root.querySelector('.text');
      let isTouch = false;
      gsap.matchMedia().add("(hover: none)", () => { isTouch = true; });

      wrapLettersInSpan(text);
      const spans = text.querySelectorAll('.letter');

      const { Engine, World, Bodies, Body, Constraint } = Matter;
      const engine = Engine.create();
      engine.world.gravity.y = 0.5;

      const group = Body.nextGroup(true);
      const scrollY = window.scrollY;
      const mid = (spans.length - 1) / 2;
      const letters = [];

      spans.forEach((span, index) => {
        const rect = span.getBoundingClientRect();
        if (rect.width === 0) return;

        const cx = rect.left + rect.width / 2;
        const cy = rect.top + scrollY + rect.height / 2;

        const body = Bodies.rectangle(cx, cy, rect.width, rect.height, {
          frictionAir: 0.05, restitution: 0.3, density: 0.001,
          collisionFilter: { group }
        });

        const constraint = Constraint.create({
          pointA: { x: cx, y: cy }, bodyB: body,
          stiffness: 0.005, damping: 0.004, length: 0
        });

        const normDist = mid === 0 ? 0 : Math.abs(index - mid) / mid;

        letters.push({
          dom: span, body, constraint,
          initialX: cx, initialY: cy,
          weight: normDist * 1,
          width: rect.width
        });

        World.add(engine.world, [body, constraint]);
      });

      for (let i = 0; i < letters.length - 1; i++) {
        World.add(engine.world, Constraint.create({
          bodyA: letters[i].body,
          bodyB: letters[i + 1].body,
          pointA: { x: letters[i].width / 2, y: 0 },
          pointB: { x: -letters[i + 1].width / 2, y: 0 },
          stiffness: 0.6, length: 0
        }));
      }

      ScrollTrigger.create({
        trigger: root,
        start: 'top 150%',
        end: 'bottom -50%',
        onEnter: () => gsap.ticker.add(tick),
        onEnterBack: () => gsap.ticker.add(tick),
        onLeave: () => gsap.ticker.remove(tick),
        onLeaveBack: () => gsap.ticker.remove(tick),
        onUpdate: (self) => {
          const velocity = self.getVelocity();
          letters.forEach(l => {
            l.constraint.pointA.y = l.initialY + velocity * 0.08 * l.weight;
          });
        }
      });

      function tick() {
        Engine.update(engine, 1000 / 60);
        letters.forEach(l => {
          Body.setAngle(l.body, l.body.angle * 0.97);
          Body.setAngularVelocity(l.body, l.body.angularVelocity * 0.95);

          const dx = l.body.position.x - l.initialX;
          const dy = l.body.position.y - l.initialY;
          l.dom.style.transform = `translate(${dx}px, ${dy}px) rotate(${l.body.angle}rad)`;
        });
      }

      function wrapLettersInSpan(element) {
        const textStr = element.textContent;
        element.innerHTML = textStr
          .split('')
          .map(char => char === ' ' ? '<span class="letter">&nbsp;</span>' : '<span class="letter">' + char + '</span>')
          .join('');
      }

      function realign() {
        letters.forEach(l => {
          gsap.to(l.constraint.pointA, { y: l.initialY, duration: 0.35, ease: "power3.out", overwrite: true });
        });
      }
      function handleTouchEnd() { realign(); }
      if (isTouch) {
        window.addEventListener('touchend', handleTouchEnd, { passive: true });
        window.addEventListener('touchcancel', handleTouchEnd, { passive: true });
      }
    })();

    /* EFFECT B — UPWARD IMAGE FLOW: bounce in at centre, then suction up + shrink on scroll. */
    (function upwardImageFlow() {
      const medias = gsap.utils.toArray(".flow__media");
      if (!medias.length) return;
      gsap.set(medias, { scale: 0, opacity: 0, yPercent: 12 });
      const tl = gsap.timeline({ scrollTrigger: { trigger: ".flow__pin", start: "top top", end: "bottom bottom", scrub: 1 } });
      medias.forEach((img, i) => {
        tl.fromTo(img, { scale: 0, opacity: 0, yPercent: 12 },
                       { scale: 1, opacity: 1, yPercent: 0, ease: "back.out(1.5)", duration: 1 }, i)
          .to(img, { yPercent: -130, scale: 0.45, opacity: 0, ease: "power2.in", duration: 1 }, i + 1);
      });
    })();
  </script>
</body>
</html>
