<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Villa Senja — motion lab (GSAP effects prototype)</title>
  <link rel="stylesheet" href="styles.css?v=100" />
  <style>
    body { margin: 0; background: var(--clay); color: var(--cream); font-family: "Hanken Grotesk", sans-serif; }
    .lab-note { position: fixed; top: 0; left: 0; right: 0; z-index: 50; padding: 0.6rem 1rem; font-size: 0.72rem; letter-spacing: 0.14em; text-transform: uppercase; color: color-mix(in srgb, var(--cream) 70%, transparent); background: rgba(20,10,4,0.6); -webkit-backdrop-filter: blur(6px); backdrop-filter: blur(6px); }
    .lab-spacer { height: 70vh; display: flex; align-items: center; justify-content: center; color: color-mix(in srgb, var(--cream) 55%, transparent); font-size: 0.8rem; letter-spacing: 0.2em; text-transform: uppercase; }
    .lab-tag { display: block; text-align: center; padding-top: 3rem; font-size: 0.72rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--ochre); }

    /* ── EFFECT A: jelly headline — PER-CHARACTER velocity-reactive bend ── */
    .jelly-stage { min-height: 150vh; display: flex; align-items: center; justify-content: center; }
    .jelly-stage .hero__senja { display: flex; }                 /* lay the chars in a row */
    /* the lab demo uses solid letters so the per-char transforms read clearly
       (the terraces-in-letters fill needs per-char image slices — separate step) */
    .jelly-stage .hero__senja { -webkit-text-fill-color: var(--cream); color: var(--cream); background: none; }
    .jelly-stage .char { display: inline-block; will-change: transform; transform-origin: 50% 50%; }

    /* ── EFFECT B: upward image flow (082) ── */
    .flow { position: relative; background: var(--espresso); }
    .flow__hint { position: absolute; top: 1.5rem; left: 50%; transform: translateX(-50%); z-index: 3; font-size: 0.72rem; letter-spacing: 0.2em; text-transform: uppercase; color: color-mix(in srgb, var(--cream) 60%, transparent); }
    .flow__pin { height: 600vh; }
    .flow__stage { position: sticky; top: 0; height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }
    .flow__media { position: absolute; width: min(38vw, 26rem); aspect-ratio: 4 / 5; object-fit: cover; border-radius: 14px; box-shadow: 0 50px 110px -45px rgba(0,0,0,0.7); will-change: transform, opacity; }
  </style>
</head>
<body>
  <div class="lab-note">Villa Senja · motion lab — 089 jelly headline (PER-CHAR velocity bend) · 082 upward image flow</div>

  <div class="lab-spacer">scroll down ↓ — then flick fast to see the jelly bend</div>

  <span class="lab-tag">089 · jelly headline (per-character velocity bend)</span>
  <section class="jelly-stage">
    <h1 class="hero__senja"><span class="char">S</span><span class="char">E</span><span class="char">N</span><span class="char">J</span><span class="char">A</span></h1>
  </section>

  <span class="lab-tag">082 · upward image flow</span>
  <section class="flow">
    <p class="flow__hint">scroll</p>
    <div class="flow__pin">
      <div class="flow__stage">
        <img class="flow__media" src="images/suite.jpg" alt="" />
        <img class="flow__media" src="images/pool.jpg" alt="" />
        <img class="flow__media" src="images/dining.jpg" alt="" />
        <img class="flow__media" src="images/pavilion.jpg" alt="" />
        <img class="flow__media" src="images/terrace.jpg" alt="" />
      </div>
    </div>
  </section>

  <div class="lab-spacer">end of lab</div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
  <script>
    gsap.registerPlugin(ScrollTrigger);

    /* EFFECT A — JELLY HEADLINE (per-character).
       Each char is displaced along an arch curve (middle lags most) by an amplitude
       driven by scroll velocity; chars also tilt along the curve's tangent. The
       amplitude springs back to 0 with an elastic ease => the whole line bends like
       jelly and wobbles flat. Per-CHAR, not a whole-block skew. */
    (function jellyHeadline() {
      const word = document.querySelector(".hero__senja");
      const chars = gsap.utils.toArray(word ? word.querySelectorAll(".char") : []);
      if (!chars.length) return;
      const N = chars.length;
      const arch  = chars.map((c, i) => Math.sin(Math.PI * (i + 0.5) / N));   // 0 at ends, 1 in the middle (the curve)
      const slope = chars.map((c, i) => Math.cos(Math.PI * (i + 0.5) / N));   // tangent -> each char tilts along the curve
      const ySet  = chars.map((c) => gsap.quickSetter(c, "y", "px"));
      const rSet  = chars.map((c) => gsap.quickSetter(c, "rotation", "deg"));
      const MAXY = 95, MAXROT = 14;
      const clamp = gsap.utils.clamp(-1, 1);
      let vel = 0, cur = 0;
      // read live scroll velocity
      ScrollTrigger.create({ onUpdate: (self) => { vel = self.getVelocity(); } });
      // CONTINUOUS loop: the bend follows current scroll speed and smoothly flattens when you stop (jelly)
      gsap.ticker.add(() => {
        const target = clamp(vel / 1400);     // how deep the line bends, by live scroll speed
        cur += (target - cur) * 0.12;         // smoothed follow = the jelly lag
        vel *= 0.9;                           // decay so it returns to flat once scrolling stops
        for (let i = 0; i < N; i++) { ySet[i](cur * arch[i] * MAXY); rSet[i](-cur * slope[i] * MAXROT); }
      });
    })();

    /* EFFECT B — UPWARD IMAGE FLOW: bounce in at centre, then suction up + shrink on scroll. */
    (function upwardImageFlow() {
      const medias = gsap.utils.toArray(".flow__media");
      if (!medias.length) return;
      gsap.set(medias, { scale: 0, opacity: 0, yPercent: 12 });
      const tl = gsap.timeline({ scrollTrigger: { trigger: ".flow__pin", start: "top top", end: "bottom bottom", scrub: 1 } });
      medias.forEach((img, i) => {
        tl.fromTo(img, { scale: 0, opacity: 0, yPercent: 12 },
                       { scale: 1, opacity: 1, yPercent: 0, ease: "back.out(1.5)", duration: 1 }, i)
          .to(img, { yPercent: -130, scale: 0.45, opacity: 0, ease: "power2.in", duration: 1 }, i + 1);
      });
    })();
  </script>
</body>
</html>
